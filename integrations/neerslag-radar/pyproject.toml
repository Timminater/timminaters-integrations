[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = [
  "ignore:Setting the shape on a NumPy array has been deprecated:DeprecationWarning",
]

[tool.ruff]
target-version = "py314"
line-length = 100

[tool.ruff.lint]
select = ["ASYNC", "B", "E", "F", "I", "UP"]
ignore = [
  "COM812",
  "E501",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]
